<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>聚寶盆 | 極簡智慧個人資產管理</title>
  
  <!-- iOS PWA 滿版設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="聚寶盆">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 針對 iOS 滿版優化，防止彈性滾動拉斷畫面 */
    body {
      background-color: #fcfdfe;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    input, select {
      user-select: text;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React 程式碼區塊 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // 預設匯率 (開機備用)
    const FALLBACK_RATES = {
      TWD: 1.0,
      USD: 32.50,
      JPY: 0.205,
      EUR: 35.20
    };

    // 預設初始資產資料
    const DEFAULT_USER_DATA = {
      accounts: [
        { id: 'acc-1', name: '國泰世華台幣戶', type: 'BANK', currency: 'TWD', balance: 350000 },
        { id: 'acc-2', name: '富邦證券台幣交割戶', type: 'INVESTMENT', currency: 'TWD', balance: 65000 },
        { id: 'acc-3', name: 'SBI 證券日幣戶', type: 'INVESTMENT', currency: 'JPY', balance: 450000 },
        { id: 'acc-4', name: '生活零用現金', type: 'CASH', currency: 'TWD', balance: 15000 }
      ],
      positions: [
        { id: 'pos-1', accountId: 'acc-2', market: 'TW', symbol: '2330', name: '台積電', shares: 1000, avgCost: 920, currentPrice: 1010 },
        { id: 'pos-2', accountId: 'acc-2', market: 'TW', symbol: '0050', name: '元大台灣50', shares: 2000, avgCost: 155, currentPrice: 182.5 }
      ],
      transactions: [
        { id: 'tx-1', type: 'DEPOSIT', amount: 350000, fromAccount: null, toAccount: 'acc-1', symbol: null, shares: null, price: null, fee: 0, date: '2026-06-01', note: '開戶初始資金' },
        { id: 'tx-2', type: 'BUY', amount: 920000, fromAccount: 'acc-2', toAccount: null, symbol: '2330', shares: 1000, price: 920, fee: 1311, date: '2026-06-15', note: '購入台積電存股' }
      ],
      savingsGoal: 2000000
    };

    // SVG 圖示包
    const Icons = {
      Wallet: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
      ),
      TrendingUp: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      ),
      TrendingDown: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6" />
        </svg>
      ),
      Plus: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
        </svg>
      ),
      Trash: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      ),
      Transfer: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
      ),
      Eye: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      ),
      EyeOff: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
        </svg>
      ),
      Logout: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 01-3-3h4a3 3 0 013 3v1" />
        </svg>
      ),
      Refresh: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" />
        </svg>
      ),
      Search: ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      )
    };

    function App() {
      // 狀態設定
      const [currentUser, setCurrentUser] = useState(null);
      const [authMode, setAuthMode] = useState('login');
      const [usernameInput, setUsernameInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      const [rememberMe, setRememberMe] = useState(true);

      const [accounts, setAccounts] = useState([]);
      const [positions, setPositions] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [savingsGoal, setSavingsGoal] = useState(2000000);

      const [rates, setRates] = useState(FALLBACK_RATES);
      const [ratesLoading, setRatesLoading] = useState(false);
      const [stockLoading, setStockLoading] = useState(false);
      const [lastUpdated, setLastUpdated] = useState("未同步");

      const [activeTab, setActiveTab] = useState('dashboard');
      const [displayCurrency, setDisplayCurrency] = useState('TWD');
      const [hideValues, setHideValues] = useState(false);
      const [notification, setNotification] = useState(null);

      const [showAddAccountModal, setShowAddAccountModal] = useState(false);
      const [showAddTxModal, setShowAddTxModal] = useState(false);

      // 表單
      const [newAccName, setNewAccName] = useState('');
      const [newAccType, setNewAccType] = useState('BANK');
      const [newAccCurrency, setNewAccCurrency] = useState('TWD');
      const [newAccBalance, setNewAccBalance] = useState('');

      const [txType, setTxType] = useState('BUY');
      const [txAccountId, setTxAccountId] = useState('');
      const [txTargetAccountId, setTxTargetAccountId] = useState('');
      const [txMarket, setTxMarket] = useState('TW');
      const [txSymbol, setTxSymbol] = useState('');
      const [txStockName, setTxStockName] = useState('');
      const [txShares, setTxShares] = useState('');
      const [txPrice, setTxPrice] = useState('');
      const [txFee, setTxFee] = useState('0');
      const [txAmount, setTxAmount] = useState('');
      const [txNote, setTxNote] = useState('');
      const [queryLoading, setQueryLoading] = useState(false);

      const triggerNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3500);
      };

      useEffect(() => {
        const remembered = localStorage.getItem('jubaopen_remembered_user');
        if (remembered) {
          handleLoginUser(remembered, true);
        }
        fetchLiveRates();
      }, []);

      useEffect(() => {
        if (!currentUser) return;
        const dataToSave = { accounts, positions, transactions, savingsGoal };
        localStorage.setItem(`jubaopen_user_data_${currentUser}`, JSON.stringify(dataToSave));
      }, [accounts, positions, transactions, savingsGoal, currentUser]);

      // 取得即時外匯匯率 API
      const fetchLiveRates = async () => {
        setRatesLoading(true);
        try {
          const response = await fetch("https://open.er-api.com/v6/latest/TWD");
          if (!response.ok) throw new Error("匯率介面連線異常");
          const data = await response.json();
          if (data && data.rates) {
            setRates({
              TWD: 1.0,
              USD: parseFloat((1 / data.rates.USD).toFixed(4)),
              JPY: parseFloat((1 / data.rates.JPY).toFixed(4)),
              EUR: parseFloat((1 / data.rates.EUR).toFixed(4)),
            });
            setLastUpdated(new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
          }
        } catch (err) {
          setRates(FALLBACK_RATES);
        } finally {
          setRatesLoading(false);
        }
      };

      // 【核心功能】透過 CORS 代理連接真實 Yahoo Finance API 獲取股價
      const fetchRealStockPrice = async (symbol, market) => {
        const formattedSymbol = market === 'TW' ? `${symbol}.TW` : symbol.toUpperCase();
        // 使用 corsproxy.io 作為免費中繼，完美避開瀏覽器 CORS 擋住的問題
        const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${formattedSymbol}?interval=1d&range=1d`;
        const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;

        try {
          const response = await fetch(proxiedUrl);
          if (!response.ok) throw new Error("找不到個股資料");
          const data = await response.json();
          const meta = data.chart?.result?.[0]?.meta;
          if (meta && meta.regularMarketPrice) {
            return {
              price: parseFloat(meta.regularMarketPrice.toFixed(2)),
              shortName: meta.shortName || symbol.toUpperCase()
            };
          }
          throw new Error("解析股價欄位失敗");
        } catch (err) {
          console.error("無法自交易所獲取報價: ", err);
          return null;
        }
      };

      // 新增持股時的自動查詢即時市價按鈕
      const handleQueryStockPrice = async () => {
        if (!txSymbol.trim()) {
          triggerNotification('請輸入股票代號再進行查詢', 'error');
          return;
        }
        setQueryLoading(true);
        const result = await fetchRealStockPrice(txSymbol.trim(), txMarket);
        setQueryLoading(false);

        if (result) {
          setTxPrice(result.price);
          if (result.shortName && !txStockName) {
            setTxStockName(result.shortName);
          }
          triggerNotification(`🔍 成功獲取 ${txSymbol.toUpperCase()} 最新市價: ${result.price} !`);
        } else {
          triggerNotification('查詢失敗，請檢查代號或市場別是否正確 (美股如 AAPL，台股如 2330)', 'error');
        }
      };

      // 更新目前所有持有股票的最新真實行情
      const handleUpdateStockQuotes = async () => {
        if (positions.length === 0) {
          triggerNotification('帳戶中目前無持股部位', 'error');
          return;
        }
        setStockLoading(true);
        triggerNotification('已向交易所發送即時詢價請求...', 'info');

        try {
          const updatedPositions = await Promise.all(
            positions.map(async (pos) => {
              const res = await fetchRealStockPrice(pos.symbol, pos.market);
              if (res) {
                return {
                  ...pos,
                  currentPrice: res.price,
                  name: res.shortName || pos.name
                };
              }
              return pos; // 失敗時保持原價
            })
          );
          setPositions(updatedPositions);
          triggerNotification('🔄 已成功同步交易所真實即時市價！');
        } catch (err) {
          triggerNotification('同步部分股價失敗，請稍候重試', 'error');
        } finally {
          setStockLoading(false);
        }
      };

      const convertAmount = (amount, fromCurr, toCurr) => {
        if (fromCurr === toCurr) return amount;
        const amountInTWD = amount * (rates[fromCurr] || FALLBACK_RATES[fromCurr]);
        return amountInTWD / (rates[toCurr] || FALLBACK_RATES[toCurr]);
      };

      const formatMoney = (amount, currency = displayCurrency) => {
        if (hideValues) return '••••••';
        const cleanAmount = Number(amount) || 0;
        let decimals = (currency === 'USD' || currency === 'EUR') ? 2 : 0;
        let symbol = 'NT$ ';
        if (currency === 'USD') symbol = '$ ';
        if (currency === 'JPY') symbol = '¥ ';
        if (currency === 'EUR') symbol = '€ ';
        return symbol + cleanAmount.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
      };

      const positionsAnalysis = useMemo(() => {
        let totalStockValueTWD = 0;
        let totalStockCostTWD = 0;
        let totalTWStockValueTWD = 0;
        let totalUSStockValueTWD = 0;

        const list = positions.map(pos => {
          const rate = pos.market === 'US' ? rates.USD : 1;
          const costTWD = pos.shares * pos.avgCost * rate;
          const valueTWD = pos.shares * pos.currentPrice * rate;
          totalStockValueTWD += valueTWD;
          totalStockCostTWD += costTWD;
          if (pos.market === 'TW') totalTWStockValueTWD += valueTWD;
          if (pos.market === 'US') totalUSStockValueTWD += valueTWD;
          return { ...pos, costTWD, valueTWD, profitTWD: valueTWD - costTWD, profitPercent: pos.avgCost > 0 ? ((pos.currentPrice - pos.avgCost) / pos.avgCost) * 100 : 0 };
        });

        return { list, totalStockValueTWD, totalStockCostTWD, totalTWStockValueTWD, totalUSStockValueTWD, totalProfitTWD: totalStockValueTWD - totalStockCostTWD, totalProfitPercent: totalStockCostTWD > 0 ? ((totalStockValueTWD - totalStockCostTWD) / totalStockCostTWD) * 100 : 0 };
      }, [positions, rates]);

      const totalCashTWD = useMemo(() => {
        return accounts.reduce((sum, acc) => sum + (acc.balance * (rates[acc.currency] || FALLBACK_RATES[acc.currency])), 0);
      }, [accounts, rates]);

      const cashBreakdownTWD = useMemo(() => {
        let twd = 0, foreign = 0;
        accounts.forEach(acc => {
          const val = acc.balance * (rates[acc.currency] || FALLBACK_RATES[acc.currency]);
          if (acc.currency === 'TWD') twd += val;
          else foreign += val;
        });
        return { twd, foreign };
      }, [accounts, rates]);

      const netWorthTWD = totalCashTWD + positionsAnalysis.totalStockValueTWD;

      const assetAllocation = useMemo(() => {
        if (netWorthTWD === 0) return [];
        return [
          { name: '台幣現金/活存', value: cashBreakdownTWD.twd, color: '#38bdf8', tailwindColor: 'bg-sky-400' },
          { name: '外幣現鈔/存款', value: cashBreakdownTWD.foreign, color: '#34d399', tailwindColor: 'bg-emerald-400' },
          { name: '台股投資市值', value: positionsAnalysis.totalTWStockValueTWD, color: '#f97316', tailwindColor: 'bg-orange-500' },
          { name: '美股投資市值', value: positionsAnalysis.totalUSStockValueTWD, color: '#a855f7', tailwindColor: 'bg-purple-500' }
        ];
      }, [netWorthTWD, cashBreakdownTWD, positionsAnalysis]);

      const donutData = useMemo(() => {
        const total = assetAllocation.reduce((sum, item) => sum + item.value, 0);
        let accumulatedPercent = 0;
        return assetAllocation.map(item => {
          const percent = total > 0 ? (item.value / total) * 100 : 0;
          const startPercent = accumulatedPercent;
          accumulatedPercent += percent;
          return { ...item, percent, startPercent };
        });
      }, [assetAllocation]);

      const handleAuthSubmit = (e) => {
        e.preventDefault();
        const username = usernameInput.trim();
        const password = passwordInput;
        if (!username || !password) {
          triggerNotification('請輸入帳號與密碼', 'error');
          return;
        }
        const userDb = JSON.parse(localStorage.getItem('jubaopen_users') || '{}');
        if (authMode === 'register') {
          if (userDb[username]) {
            triggerNotification('此帳號已存在，請直接登入', 'error');
            return;
          }
          userDb[username] = password;
          localStorage.setItem('jubaopen_users', JSON.stringify(userDb));
          localStorage.setItem(`jubaopen_user_data_${username}`, JSON.stringify(DEFAULT_USER_DATA));
          triggerNotification('聚寶盆帳號註冊成功！🎉');
          setAuthMode('login');
        } else {
          if (!userDb[username] || userDb[username] !== password) {
            triggerNotification('帳號或密碼輸入錯誤', 'error');
            return;
          }
          handleLoginUser(username, rememberMe);
        }
      };

      const handleLoginUser = (username, remember) => {
        setCurrentUser(username);
        if (remember) {
          localStorage.setItem('jubaopen_remembered_user', username);
        }
        const userData = JSON.parse(localStorage.getItem(`jubaopen_user_data_${username}`));
        if (userData) {
          setAccounts(userData.accounts || []);
          setPositions(userData.positions || []);
          setTransactions(userData.transactions || []);
          setSavingsGoal(userData.savingsGoal || 2000000);
        }
        triggerNotification(`歡迎回來，您的聚寶盆已開啟 🌸`);
      };

      const handleLogout = () => {
        setCurrentUser(null);
        localStorage.removeItem('jubaopen_remembered_user');
        setUsernameInput('');
        setPasswordInput('');
        triggerNotification('聚寶盆已安全上鎖 🔒');
      };

      const handleAddAccount = (e) => {
        e.preventDefault();
        const newAccount = { id: 'acc-' + Date.now(), name: newAccName, type: newAccType, currency: newAccCurrency, balance: parseFloat(newAccBalance) };
        setAccounts([...accounts, newAccount]);
        setTransactions([{ id: 'tx-' + Date.now(), type: 'DEPOSIT', amount: parseFloat(newAccBalance), fromAccount: null, toAccount: newAccount.id, symbol: null, shares: null, price: null, fee: 0, date: new Date().toISOString().split('T')[0], note: `開啟資產戶「${newAccName}」初始資金` }, ...transactions]);
        setNewAccName('');
        setNewAccBalance('');
        setShowAddAccountModal(false);
        triggerNotification('新資產帳戶已存入聚寶盆 🌸');
      };

      const handleDeleteAccount = (id, name) => {
        if (positions.some(p => p.accountId === id)) {
          triggerNotification(`無法刪除「${name}」：該帳戶內仍綁定有股票持股`, 'error');
          return;
        }
        setAccounts(accounts.filter(a => a.id !== id));
        triggerNotification(`已手動移除「${name}」帳戶`);
      };

      const handleDeletePosition = (posId, symbol) => {
        setPositions(positions.filter(p => p.id !== posId));
        triggerNotification(`已手動移除 ${symbol} 持股項目`);
      };

      const handleAddTransaction = (e) => {
        e.preventDefault();
        const selectedAccount = accounts.find(a => a.id === txAccountId);
        const todayStr = new Date().toISOString().split('T')[0];

        if (txType === 'TRANSFER') {
          const fromAcc = accounts.find(a => a.id === txAccountId);
          const toAcc = accounts.find(a => a.id === txTargetAccountId);
          const rawAmount = parseFloat(txAmount);
          if (fromAcc.balance < rawAmount) {
            triggerNotification(`轉帳失敗：${fromAcc.name} 餘額不足！`, 'error');
            return;
          }
          const conversionRate = parseFloat(txPrice) || convertAmount(1, fromAcc.currency, toAcc.currency);
          setAccounts(accounts.map(acc => {
            if (acc.id === fromAcc.id) return { ...acc, balance: acc.balance - rawAmount };
            if (acc.id === toAcc.id) return { ...acc, balance: acc.balance + (rawAmount * conversionRate) };
            return acc;
          }));
          setTransactions([{ id: 'tx-' + Date.now(), type: 'TRANSFER', amount: rawAmount, fromAccount: fromAcc.id, toAccount: toAcc.id, symbol: null, shares: null, price: parseFloat(txPrice) || null, fee: parseFloat(txFee) || 0, date: todayStr, note: txNote || `從 ${fromAcc.name} 移往 ${toAcc.name}` }, ...transactions]);
          setShowAddTxModal(false);
          triggerNotification('互轉與自動換匯記帳成功！🌸');
          return;
        }

        const sharesNum = parseFloat(txShares);
        const priceNum = parseFloat(txPrice);
        const feeNum = parseFloat(txFee) || 0;
        const cleanSymbol = txSymbol.trim().toUpperCase();

        if (txType === 'DIVIDEND') {
          const divAmount = parseFloat(txAmount);
          setAccounts(accounts.map(acc => acc.id === selectedAccount.id ? { ...acc, balance: acc.balance + divAmount } : acc));
          setTransactions([{ id: 'tx-' + Date.now(), type: 'DIVIDEND', amount: divAmount, fromAccount: null, toAccount: selectedAccount.id, symbol: cleanSymbol, shares: null, price: null, fee: 0, date: todayStr, note: txNote || `${cleanSymbol} 存股配息入帳` }, ...transactions]);
          setShowAddTxModal(false);
          triggerNotification('股息所得已存入交割戶！');
          return;
        }

        const totalTradeCost = (sharesNum * priceNum) + (txType === 'BUY' ? feeNum : -feeNum);
        if (txType === 'BUY') {
          if (selectedAccount.balance < totalTradeCost) {
            triggerNotification(`交割帳戶餘額不足以支付此筆交易！`, 'error');
            return;
          }
          setAccounts(accounts.map(acc => acc.id === selectedAccount.id ? { ...acc, balance: acc.balance - totalTradeCost } : acc));
          const existingPosIndex = positions.findIndex(p => p.accountId === selectedAccount.id && p.symbol === cleanSymbol);
          if (existingPosIndex > -1) {
            const updatedPositions = [...positions];
            const prevPos = updatedPositions[existingPosIndex];
            const newShares = prevPos.shares + sharesNum;
            updatedPositions[existingPosIndex] = { ...prevPos, shares: newShares, avgCost: parseFloat((((prevPos.shares * prevPos.avgCost) + (sharesNum * priceNum)) / newShares).toFixed(2)), currentPrice: priceNum };
            setPositions(updatedPositions);
          } else {
            setPositions([...positions, { id: 'pos-' + Date.now(), accountId: selectedAccount.id, market: txMarket, symbol: cleanSymbol, name: txStockName.trim() || cleanSymbol, shares: sharesNum, avgCost: priceNum, currentPrice: priceNum }]);

          const updatedPositions = [...positions];
          const prevPos = updatedPositions[existingPosIndex];
          const remainShares = prevPos.shares - sharesNum;
          if (remainShares === 0) updatedPositions.splice(existingPosIndex, 1);

                      {['BUY', 'SELL', 'TRANSFER', 'DIVIDEND'].map(type => (
                        <button key={type} type="button" onClick={() => setTxType(type)} className={`py-2 px-1 text-xs font-bold rounded-xl border transition ${txType === type ? 'bg-sky-50 text-sky-500 border-sky-200' : 'bg-slate-50/50 text-slate-400 border-slate-100'}`}>
                          {type === 'BUY' ? '股票買入' : type === 'SELL' ? '股票賣出' : type === 'TRANSFER' ? '同名轉帳' : '配息/股利'}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] text-slate-400 block mb-1">交割/儲蓄帳戶</label>
                      <select value={txAccountId} onChange={e => setTxAccountId(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-xs focus:outline-none">
                        <option value="">-- 選擇帳戶 --</option>
                        {accounts.map(acc => <option key={acc.id} value={acc.id}>{acc.name} ({acc.currency} 餘額: {acc.balance.toLocaleString()})</option>)}
                      </select>
                    </div>
                    {txType === 'TRANSFER' && (
                      <div>
                        <label className="text-[10px] text-slate-400 block mb-1">收款/流入帳戶</label>
                        <select value={txTargetAccountId} onChange={e => setTxTargetAccountId(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-xs focus:outline-none">
                          <option value="">-- 選擇帳戶 --</option>
                          {accounts.map(acc => <option key={acc.id} value={acc.id}>{acc.name} ({acc.currency} 餘額: {acc.balance.toLocaleString()})</option>)}
                        </select>
                      </div>
                    )}
                  </div>

                  {(txType === 'BUY' || txType === 'SELL' || txType === 'DIVIDEND') && (
                    <div className="p-4 bg-slate-50 border rounded-2xl space-y-3">
                      <div className="flex justify-between items-center border-b pb-2">
                        <span className="text-xs font-bold text-sky-500">證券代號與報價查詢</span>
                        <div className="flex space-x-1">
                          <button type="button" onClick={() => setTxMarket('TW')} className={`text-[9px] font-bold px-2 py-0.5 rounded ${txMarket === 'TW' ? 'bg-sky-200 text-sky-900' : 'bg-slate-100 text-slate-400'}`}>台股</button>
                          <button type="button" onClick={() => setTxMarket('US')} className={`text-[9px] font-bold px-2 py-0.5 rounded ${txMarket === 'US' ? 'bg-sky-200 text-sky-900' : 'bg-slate-100 text-slate-400'}`}>美股</button>
                        </div>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-12 gap-3 items-center">
                        <div className="sm:col-span-4">
                          <input type="text" placeholder="代號: 2330 / AAPL" required value={txSymbol} onChange={e => setTxSymbol(e.target.value)} className="w-full bg-white border rounded-lg px-3 py-2 text-xs focus:outline-none" />
                        </div>
                        <div className="sm:col-span-5">
                          <input type="text" placeholder="公司名稱 (點查詢自動帶出)" value={txStockName} onChange={e => setTxStockName(e.target.value)} className="w-full bg-white border rounded-lg px-3 py-2 text-xs focus:outline-none" />
                        </div>
                        <div className="sm:col-span-3">
                          <button type="button" onClick={handleQueryStockPrice} disabled={queryLoading} className="w-full h-9 bg-sky-200 hover:bg-sky-300 text-sky-900 font-bold rounded-lg text-xs flex items-center justify-center gap-1 transition-colors">
                            <Icons.Search className="w-3.5 h-3.5" />
                            <span>{queryLoading ? '查詢中...' : '查詢現價'}</span>
                          </button>
                        </div>
                      </div>
                      {txType !== 'DIVIDEND' && (
                        <div className="grid grid-cols-3 gap-3">
                          <div>
                            <label className="text-[9px] text-slate-400 block mb-0.5">交易股數</label>
                            <input type="number" placeholder="股數" required value={txShares} onChange={e => setTxShares(e.target.value)} className="w-full bg-white border rounded-lg px-3 py-1.5 text-xs focus:outline-none" />
                          </div>
                          <div>
                            <label className="text-[9px] text-slate-400 block mb-0.5">每股單價</label>
                            <input type="number" placeholder="價格" step="any" required value={txPrice} onChange={e => setTxPrice(e.target.value)} className="w-full bg-white border rounded-lg px-3 py-1.5 text-xs focus:outline-none" />
                          </div>
                          <div>
                            <label className="text-[9px] text-slate-400 block mb-0.5">交易手續費</label>
                            <input type="number" placeholder="0" value={txFee} onChange={e => setTxFee(e.target.value)} className="w-full bg-white border rounded-lg px-3 py-1.5 text-xs focus:outline-none" />
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {(txType === 'TRANSFER' || txType === 'DIVIDEND') && (
                    <div>
                      <label className="text-[10px] text-slate-400 block mb-1">交易金額 ({txType === 'TRANSFER' ? '依原幣別填寫' : '所得總金額'})</label>
                      <input type="number" placeholder="0.00" required value={txAmount} onChange={e => setTxAmount(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-4 py-2.5 text-xs focus:outline-none" />
                    </div>
                  )}

                  <div>
                    <label className="text-[10px] text-slate-400 block mb-1">備註說明 (選填)</label>
                    <input type="text" placeholder="如：定期定額、除權息波段" value={txNote} onChange={e => setTxNote(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-4 py-2.5 text-xs focus:outline-none" />
                  </div>

                  <div className="flex justify-end space-x-3 pt-4 border-t">
                    <button type="button" onClick={() => setShowAddTxModal(false)} className="px-4 py-2 bg-slate-100 text-xs font-bold rounded-xl text-slate-500">取消</button>
                    <button type="submit" className="px-5 py-2 bg-sky-200 text-xs font-bold rounded-xl text-sky-900">確認並登記交易</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <footer className="bg-white border-t border-slate-100 py-6 text-center text-[11px] text-slate-400 mt-auto">
            <span>© 2026 聚寶盆 · 支援 iOS PWA 滿版主畫面安裝機制</span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
