<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 安全存儲包裝器 (safeStorage) ---
    // 解決沙盒環境 (Canvas) 阻擋 localStorage 導致的無聲崩潰問題
    const memoryStorage = {};
    const safeStorage = {
      getItem(key) {
        try { 
          if (typeof window !== 'undefined' && window.localStorage) {
            return window.localStorage.getItem(key); 
          }
        } catch (e) { 
          console.warn("Storage access restricted, using memory storage instead.");
        }
        return memoryStorage[key] || null;
      },
      setItem(key, value) {
        try { 
          if (typeof window !== 'undefined' && window.localStorage) {
            window.localStorage.setItem(key, value); 
            return;
          }
        } catch (e) { 
          console.warn("Storage access restricted, using memory storage instead.");
        }
        memoryStorage[key] = String(value);
      },
      removeItem(key) {
        try { 
          if (typeof window !== 'undefined' && window.localStorage) {
            window.localStorage.removeItem(key); 
            return;
          }
        } catch (e) { 
          console.warn("Storage access restricted, using memory storage instead.");
        }
        delete memoryStorage[key];
      }
    };

    const LOGO_URL = "https://raw.githubusercontent.com/lin014102/bowl/main/1783576564555.jpg";

    const FALLBACK_RATES = { TWD: 1.0, USD: 32.50, JPY: 0.205, EUR: 35.20 };

    const DEFAULT_USER_DATA = {
      accounts: [
        { id: 'acc-1', name: '國泰世華台幣戶', type: 'BANK', currency: 'TWD', balance: 350000 },
        { id: 'acc-2', name: '富邦證券台幣交割戶', type: 'INVESTMENT', currency: 'TWD', balance: 65000 },
        { id: 'acc-3', name: 'SBI 證券日幣戶', type: 'INVESTMENT', currency: 'JPY', balance: 450000 },
        { id: 'acc-4', name: '生活零用現金', type: 'CASH', currency: 'TWD', balance: 15000 }
      ],
      positions: [
        { id: 'pos-1', accountId: 'acc-2', market: 'TW', symbol: '2330', name: '台積電', shares: 1000, avgCost: 920, currentPrice: 1010 },
        { id: 'pos-2', accountId: 'acc-2', market: 'TW', symbol: '0050', name: '元大台灣50', shares: 2000, avgCost: 155, currentPrice: 182.5 }
      ],
      transactions: [
        { id: 'tx-1', type: 'DEPOSIT', amount: 350000, fromAccount: null, toAccount: 'acc-1', symbol: null, shares: null, price: null, fee: 0, date: '2026-06-01', note: '開戶初始資金' },
        { id: 'tx-2', type: 'BUY', amount: 920000, fromAccount: 'acc-2', toAccount: null, symbol: '2330', shares: 1000, price: 920, fee: 1311, date: '2026-06-15', note: '購入台積電存股' }
      ],

    };

    // SVG 圖示包
    const Icons = {
      TrendingUp: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
      Trash: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
      Eye: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      EyeOff: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" /></svg>,
      Logout: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 01-3-3h4a3 3 0 013 3v1" /></svg>,
      Refresh: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" /></svg>,
      Search: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
      Cloud: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>
    };

    function App() {
      // ----------------------------------------
      // 基礎載入狀態
      // ----------------------------------------
      const [loginLogoError, setLoginLogoError] = useState(false);
      const [headerLogoError, setHeaderLogoError] = useState(false);

      // ----------------------------------------
      // 雲端配置狀態
      // ----------------------------------------
      const [isFirebaseActive, setIsFirebaseActive] = useState(false);
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [cloudSyncStatus, setCloudSyncStatus] = useState('local'); // local | syncing | synced | error
      const [firebaseConfigInput, setFirebaseConfigInput] = useState('');
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [isDataLoaded, setIsDataLoaded] = useState(false);

      // 登入狀態管理
      const [currentUser, setCurrentUser] = useState(null);
      const [authMode, setAuthMode] = useState('login');
      const [usernameInput, setUsernameInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');

      // 個人財政數據
      const [accounts, setAccounts] = useState([]);
      const [positions, setPositions] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [savingsGoal, setSavingsGoal] = useState(2000000);

      // 匯率與行情同步
      const [rates, setRates] = useState(FALLBACK_RATES);
      const [stockLoading, setStockLoading] = useState(false);

      // 系統導航控制
      const [activeTab, setActiveTab] = useState('dashboard');
      const [displayCurrency, setDisplayCurrency] = useState('TWD');
      const [hideValues, setHideValues] = useState(false);
      const [notification, setNotification] = useState(null);

      // 各項對話框開關
      const [showAddAccountModal, setShowAddAccountModal] = useState(false);
      const [editingAccount, setEditingAccount] = useState(null);
      const [showAddTxModal, setShowAddTxModal] = useState(false);

      // 表單狀態
      const [newAccName, setNewAccName] = useState('');
      const [newAccType, setNewAccType] = useState('BANK');
      const [newAccCurrency, setNewAccCurrency] = useState('TWD');
      const [newAccBalance, setNewAccBalance] = useState('');
      const [txType, setTxType] = useState('BUY');
      const [txAccountId, setTxAccountId] = useState('');
      const [txTargetAccountId, setTxTargetAccountId] = useState('');
      const [txMarket, setTxMarket] = useState('TW');
      const [txSymbol, setTxSymbol] = useState('');
      const [txStockName, setTxStockName] = useState('');
      const [txShares, setTxShares] = useState('');
      const [txPrice, setTxPrice] = useState('');
      const [txFee, setTxFee] = useState('0');
      const [txAmount, setTxAmount] = useState('');
      const [txNote, setTxNote] = useState('');
      const [queryLoading, setQueryLoading] = useState(false);

      const triggerNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3500);
      };

      // --- 超強智慧容錯解析器 ---
      // 專門修補漏複製的大括號、引號、欄位標籤等毀損格式
      const parseFirebaseConfig = (input) => {
        const cleanInput = input.trim();
        try {
          return JSON.parse(cleanInput);
        } catch (e) {
          // 正規表達式動態提取常用欄位，支持無引號、單引號、雙引號
          const extract = (key) => {
            const regex = new RegExp(key + '\\s*:\\s*["\'`]?([^"\'`\\\\\\s,]+)["\'`]?');
            const match = cleanInput.match(regex);
            return match ? match[1] : null;
          };

          let apiKey = extract('apiKey');
          let projectId = extract('projectId');
          let appId = extract('appId');
          let authDomain = extract('authDomain');
          let storageBucket = extract('storageBucket');
          let messagingSenderId = extract('messagingSenderId');
          let measurementId = extract('measurementId');

          // --- 核心容錯升級：特徵正則匹配 (即使沒有 apiKey: 標籤也能完美救回) ---
          if (!apiKey) {
            // 搜尋以 AIzaSy 開頭的 Firebase/Google API Key
            const apiKeyMatch = cleanInput.match(/(AIzaSy[A-Za-z0-9_-]+)/);
            if (apiKeyMatch) apiKey = apiKeyMatch[1];
          }

          if (!appId) {
            // 搜尋標準的 web appId 格式 (1:數字:web:雜湊值)
            const appIdMatch = cleanInput.match(/(1:\d+:web:[a-f0-9]+)/);
            if (appIdMatch) appId = appIdMatch[1];
          }

          if (!projectId) {
            // 若無 projectId 但有 authDomain，從 authDomain (xxx.firebaseapp.com) 提取前綴
            if (authDomain) {
              projectId = authDomain.split('.')[0];
            } else {
              const domainMatch = cleanInput.match(/["']?([^"'\s]+)\.firebaseapp\.com["']?/);
              if (domainMatch) {
                projectId = domainMatch[1];
                authDomain = domainMatch[1] + ".firebaseapp.com";
              }
            }
          }

          if (!messagingSenderId) {
            // 尋找 11-13 位的發送者 ID 數字
            const senderMatch = cleanInput.match(/\b(\d{11,13})\b/);
            if (senderMatch) messagingSenderId = senderMatch[1];
          }

          // 重新補齊其他常用關聯欄位
          if (projectId) {
            if (!authDomain) authDomain = projectId + ".firebaseapp.com";
            if (!storageBucket) storageBucket = projectId + ".firebasestorage.app";
          }

          if (apiKey && projectId && appId) {
            return { apiKey, authDomain, projectId, storageBucket, messagingSenderId, appId, measurementId };
          }
        }
        throw new Error("無法解析您的設定，請確認貼上的程式碼包含完整的 apiKey, projectId 與 appId！");
      };

      // ----------------------------------------
      // 初始化加載與檢測
      // ----------------------------------------
      useEffect(() => {
        const savedConfigStr = safeStorage.getItem('jubaopen_firebase_config');
        if (savedConfigStr) {
          try {
            const config = JSON.parse(savedConfigStr);
            if (typeof firebase !== 'undefined') {
              if (!firebase.apps.length) {
                firebase.initializeApp(config);
              }
              setIsFirebaseActive(true);
              setFirebaseConfigInput(savedConfigStr);
            }
          } catch (e) {
            console.error("Firebase 初始化失敗", e);
          }
        }

        const remembered = safeStorage.getItem('jubaopen_remembered_user');
        if (remembered) {
          if (!savedConfigStr) {
            handleLoginUser(remembered, true);
          }
        } else if (!savedConfigStr) {
          setIsDataLoaded(true);
        }

        fetchLiveRates();
      }, []);

      // 監聽 Firebase 登入
      useEffect(() => {
        if (!isFirebaseActive || typeof firebase === 'undefined') return;
        const unsubscribe = firebase.auth().onAuthStateChanged(async (user) => {
          if (user) {
            setFirebaseUser(user);
            setCurrentUser({ uid: user.uid, email: user.email });
            await fetchCloudData(user.uid);
          } else {
            setFirebaseUser(null);
            setCurrentUser(null);
            setIsDataLoaded(true);
          }
        });
        return () => unsubscribe();
      }, [isFirebaseActive]);

      // 載入雲端專屬資產
      const fetchCloudData = async (uid) => {
        if (typeof firebase === 'undefined') return;
        setCloudSyncStatus('syncing');
        try {
          const db = firebase.firestore();
          const doc = await db.collection('users').doc(uid).get();
          if (doc.exists) {
            const data = doc.data();
            setAccounts(data.accounts || []);
            setPositions(data.positions || []);
            setTransactions(data.transactions || []);
            setSavingsGoal(data.savingsGoal || 2000000);
            triggerNotification("☁️ 雲端同步完成，資產更新成功！", 'success');
          } else {
            // 自動移植本機舊資產
            const legacyUser = usernameInput || safeStorage.getItem('jubaopen_remembered_user');
            const localLegacyData = safeStorage.getItem(`jubaopen_user_data_${legacyUser}`);
            if (localLegacyData) {
              const parsed = JSON.parse(localLegacyData);
              setAccounts(parsed.accounts || []);
              setPositions(parsed.positions || []);
              setTransactions(parsed.transactions || []);
              setSavingsGoal(parsed.savingsGoal || 2000000);
              triggerNotification("☁️ 偵測到本機資料，已自動同步移植至您的雲端儲存空間！", 'success');
            } else {
              setAccounts(DEFAULT_USER_DATA.accounts);
              setPositions(DEFAULT_USER_DATA.positions);
              setTransactions(DEFAULT_USER_DATA.transactions);
              setSavingsGoal(DEFAULT_USER_DATA.savingsGoal);
              triggerNotification("☁️ 新雲端聚寶盆建立初始化成功！", 'success');
            }
          }
          setIsDataLoaded(true);
          setCloudSyncStatus('synced');
        } catch (e) {
          setCloudSyncStatus('error');
          setIsDataLoaded(true);
        }
      };

      // 自動雙軌同步（儲存數據）
      useEffect(() => {
        if (!isDataLoaded || !currentUser) return;
        if (isFirebaseActive && firebaseUser && typeof firebase !== 'undefined') {
          setCloudSyncStatus('syncing');
          firebase.firestore().collection('users').doc(firebaseUser.uid).set({
            accounts, positions, transactions, savingsGoal,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }).then(() => setCloudSyncStatus('synced')).catch(() => setCloudSyncStatus('error'));
        } else {
          // 本機存檔
          const dataToSave = { accounts, positions, transactions, savingsGoal };
          safeStorage.setItem(`jubaopen_user_data_${currentUser.displayName || currentUser.uid}`, JSON.stringify(dataToSave));
          setCloudSyncStatus('local');
        }
      }, [accounts, positions, transactions, savingsGoal, isDataLoaded, currentUser]);

      // ----------------------------------------
      // 登入註冊核心邏輯
      // ----------------------------------------
      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        const username = usernameInput.trim();
        const password = passwordInput;
        if (!username || !password) { triggerNotification('請輸入帳號與密碼', 'error'); return; }

        try {
          if (isFirebaseActive && typeof firebase !== 'undefined' && firebase.auth) {
            setCloudSyncStatus('syncing');
            const email = username.includes('@') ? username : `${username}@jubaopen.com`;
            if (authMode === 'register') {
              const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
              setCurrentUser({ uid: cred.user.uid, email: cred.user.email });
              triggerNotification('聚寶盆雲端帳號註冊成功！🎉', 'success');
            } else {
              const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
              setCurrentUser({ uid: cred.user.uid, email: cred.user.email });
              triggerNotification('登入雲端成功！☁️', 'success');
            }
          } else {
            // 本機模式
            const localUsers = JSON.parse(safeStorage.getItem('jubaopen_local_users') || '{}');
            if (authMode === 'register') {
              if (localUsers[username]) {
                triggerNotification('此帳號已存在，請直接登入', 'error');
                return;
              }
              localUsers[username] = password;
              safeStorage.setItem('jubaopen_local_users', JSON.stringify(localUsers));
              handleLoginUser(username, true);
              triggerNotification('本機帳號註冊成功！🎉', 'success');
            } else {
              if (localUsers[username] === password) {
                handleLoginUser(username, true);
              } else if (username === 'admin' && password === 'admin') {
                // 預設快速調試帳號
                handleLoginUser('admin', true);
              } else {
                triggerNotification('帳號或密碼輸入錯誤，未註冊請先點選下方「註冊」', 'error');
              }
            }
          }
        } catch (error) {
          console.error("Auth Error:", error);
          triggerNotification('登入/註冊失敗：' + (error.message || '發生未知錯誤'), 'error');
          setCloudSyncStatus('error');
        }
      };

      const handleLoginUser = (username, remember) => {
        setCurrentUser({ uid: `local_${username}`, displayName: username });
        if (remember) safeStorage.setItem('jubaopen_remembered_user', username);
        const userData = JSON.parse(safeStorage.getItem(`jubaopen_user_data_${username}`));
        if (userData) {
          setAccounts(userData.accounts || []);
          setPositions(userData.positions || []);
          setTransactions(userData.transactions || []);
          setSavingsGoal(userData.savingsGoal || 2000000);
        } else {
          setAccounts(DEFAULT_USER_DATA.accounts);
          setPositions(DEFAULT_USER_DATA.positions);
          setTransactions(DEFAULT_USER_DATA.transactions);
          setSavingsGoal(DEFAULT_USER_DATA.savingsGoal);
        }
        setIsDataLoaded(true);
        triggerNotification(`歡迎回來，您的本機聚寶盆已開啟 🌸`, 'success');
      };

      const handleLogout = () => {
        if (isFirebaseActive && typeof firebase !== 'undefined') firebase.auth().signOut();
        setCurrentUser(null);
        safeStorage.removeItem('jubaopen_remembered_user');
        setUsernameInput('');
        setPasswordInput('');
        setIsDataLoaded(false);
        triggerNotification('聚寶盆已安全上鎖 🔒', 'success');
      };

      // 保存雲端 API 設定
      const handleSaveSettings = async (e) => {
        e.preventDefault();
        const val = firebaseConfigInput.trim();
        
        // 若清空輸入，則清除金鑰並無縫切回本機模式
        if (!val) {
          safeStorage.removeItem('jubaopen_firebase_config');
          setIsFirebaseActive(false);
          setShowSettingsModal(false);
          triggerNotification('已清除金鑰，切換回本機模式', 'success');
          return;
        }

        try {
          const config = parseFirebaseConfig(val);
          safeStorage.setItem('jubaopen_firebase_config', JSON.stringify(config));
          
          // 熱載入 Firebase 實例，如果已經初始化過則重新建立
          if (typeof firebase !== 'undefined') {
            if (firebase.apps.length > 0) {
              try {
                await firebase.app().delete();
              } catch (appErr) {
                console.warn("註銷舊 Firebase 失敗：", appErr);
              }
            }
            firebase.initializeApp(config);
          }
          
          setIsFirebaseActive(true);
          setShowSettingsModal(false);
          triggerNotification('雲端同步功能配置成功！✨', 'success');
        } catch (err) {
          console.error("Config Save Error:", err);
          triggerNotification('設定失敗：' + (err.message || '格式不正確，請重新檢查'), 'error');
        }
      };

      // ----------------------------------------
      // 匯率與行情對外 API
      // ----------------------------------------
      const fetchLiveRates = async () => {
        try {
          const res = await fetch("https://open.er-api.com/v6/latest/TWD");
          const data = await res.json();
          if (data && data.rates) {
            setRates({
              TWD: 1.0,
              USD: parseFloat((1 / data.rates.USD).toFixed(4)),
              JPY: parseFloat((1 / data.rates.JPY).toFixed(4)),
              EUR: parseFloat((1 / data.rates.EUR).toFixed(4)),
            });
          }
        } catch (err) {
          setRates(FALLBACK_RATES);
        }
      };

      const fetchRealStockPrice = async (symbol, market) => {
        const formattedSymbol = market === 'TW' ? `${symbol}.TW` : symbol.toUpperCase();
        const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${formattedSymbol}?interval=1d&range=1d`;
        const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
        try {
          const res = await fetch(proxiedUrl);
          const data = await res.json();
          const meta = data.chart?.result?.[0]?.meta;
          if (meta && meta.regularMarketPrice) {
            return { price: parseFloat(meta.regularMarketPrice.toFixed(2)), shortName: meta.shortName || symbol.toUpperCase() };
          }
          return null;
        } catch (err) {
          return null;
        }
      };

      const handleQueryStockPrice = async () => {
        if (!txSymbol.trim()) { triggerNotification('請先輸入標的代號', 'error'); return; }
        setQueryLoading(true);
        const res = await fetchRealStockPrice(txSymbol.trim(), txMarket);
        setQueryLoading(false);
        if (res) {
          setTxPrice(res.price);
          if (res.shortName && !txStockName) setTxStockName(res.shortName);
          triggerNotification(`🔍 獲取即時市價成功: ${res.price}`);
        } else {
          triggerNotification('無法獲取報價，請手動輸入或確認代號', 'error');
        }
      };

      const handleUpdateStockQuotes = async () => {
        if (positions.length === 0) return;
        setStockLoading(true);
        triggerNotification('同步實時行情中...', 'info');
        try {
          const updated = await Promise.all(positions.map(async (pos) => {
            const res = await fetchRealStockPrice(pos.symbol, pos.market);
            return res ? { ...pos, currentPrice: res.price, name: res.shortName || pos.name } : pos;
          }));
          setPositions(updated);
          triggerNotification('🔄 已成功同步最新即時市價！', 'success');
        } catch (err) {
          triggerNotification('部分股票更新失敗，請檢查網路連線', 'error');
        } finally {
          setStockLoading(false);
        }
      };

      const convertAmount = (amount, fromCurr, toCurr) => {
        if (fromCurr === toCurr) return amount;
        const inTWD = amount * (rates[fromCurr] || FALLBACK_RATES[fromCurr]);
        return inTWD / (rates[toCurr] || FALLBACK_RATES[toCurr]);
      };

      const formatMoney = (amount, currency = displayCurrency) => {
        if (hideValues) return '••••••';
        const cleanAmount = Number(amount) || 0;
        let decimals = (currency === 'USD' || currency === 'EUR') ? 2 : 0;
        let sym = currency === 'USD' ? '$ ' : currency === 'JPY' ? '¥ ' : currency === 'EUR' ? '€ ' : 'NT$ ';
        return sym + cleanAmount.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
      };

      // ----------------------------------------
      // 財務與圖表重算計算
      // ----------------------------------------
      const positionsAnalysis = useMemo(() => {
        let totalValue = 0, totalCost = 0, totalTW = 0, totalUS = 0;
        const list = positions.map(pos => {
          const rate = pos.market === 'US' ? rates.USD : 1;
          const cost = pos.shares * pos.avgCost * rate;
          const val = pos.shares * pos.currentPrice * rate;
          totalValue += val; totalCost += cost;
          if (pos.market === 'TW') totalTW += val;
          if (pos.market === 'US') totalUS += val;
          return { ...pos, costTWD: cost, valueTWD: val, profitTWD: val - cost, profitPercent: pos.avgCost > 0 ? ((pos.currentPrice - pos.avgCost) / pos.avgCost) * 100 : 0 };
        });
        return { list, totalStockValueTWD: totalValue, totalTWStockValueTWD: totalTW, totalUSStockValueTWD: totalUS };
      }, [positions, rates]);

      const totalCashTWD = useMemo(() => accounts.reduce((s, a) => s + (a.balance * (rates[a.currency] || FALLBACK_RATES[a.currency])), 0), [accounts, rates]);
      
      const cashBreakdownTWD = useMemo(() => {
        let twd = 0, foreign = 0;
        accounts.forEach(a => {
          const val = a.balance * (rates[a.currency] || FALLBACK_RATES[a.currency]);
          if (a.currency === 'TWD') twd += val; else foreign += val;
        });
        return { twd, foreign };
      }, [accounts, rates]);

      const netWorthTWD = totalCashTWD + positionsAnalysis.totalStockValueTWD;
      
      const assetAllocation = useMemo(() => [
        { name: '台幣存款', value: cashBreakdownTWD.twd, color: '#60a5fa', tailwindColor: 'bg-blue-400' },
        { name: '外幣資產', value: cashBreakdownTWD.foreign, color: '#34d399', tailwindColor: 'bg-emerald-400' },
        { name: '台股投資', value: positionsAnalysis.totalTWStockValueTWD, color: '#fb923c', tailwindColor: 'bg-orange-400' },
        { name: '美股投資', value: positionsAnalysis.totalUSStockValueTWD, color: '#c084fc', tailwindColor: 'bg-purple-400' }
      ].filter(i => i.value > 0), [cashBreakdownTWD, positionsAnalysis]);

      const donutData = useMemo(() => {
        const total = assetAllocation.reduce((s, i) => s + i.value, 0);
        let acc = 0;
        return assetAllocation.map(i => {
          const pct = total > 0 ? (i.value / total) * 100 : 0;
          const res = { ...i, percent: pct, startPercent: acc };
          acc += pct;
          return res;
        });
      }, [assetAllocation]);

      // ----------------------------------------
      // 帳戶與交易異動保存
      // ----------------------------------------
      const handleAccountSubmit = (e) => {
        e.preventDefault();
        const balanceNum = parseFloat(newAccBalance);
        if (isNaN(balanceNum)) return;
        if (editingAccount) {
          setAccounts(accounts.map(a => a.id === editingAccount.id ? { ...a, name: newAccName, type: newAccType, currency: newAccCurrency, balance: balanceNum } : a));
          setTransactions([{ id: 'tx-' + Date.now(), type: 'DEPOSIT', amount: balanceNum - editingAccount.balance, fromAccount: null, toAccount: editingAccount.id, symbol: null, shares: null, price: null, fee: 0, date: new Date().toISOString().split('T')[0], note: `更新「${newAccName}」餘額` }, ...transactions]);
        } else {
          const newAccount = { id: 'acc-' + Date.now(), name: newAccName, type: newAccType, currency: newAccCurrency, balance: balanceNum };
          setAccounts([...accounts, newAccount]);
          setTransactions([{ id: 'tx-' + Date.now(), type: 'DEPOSIT', amount: balanceNum, fromAccount: null, toAccount: newAccount.id, symbol: null, shares: null, price: null, fee: 0, date: new Date().toISOString().split('T')[0], note: `開設儲蓄戶「${newAccName}」` }, ...transactions]);
        }
        setShowAddAccountModal(false); setEditingAccount(null); setNewAccName(''); setNewAccBalance('');
        triggerNotification('帳戶資料更新成功 🌸', 'success');
      };

      const handleDeleteAccount = (id, name) => {
        if (positions.some(p => p.accountId === id)) { triggerNotification(`無法刪除：該帳戶仍存在股票投資部位`, 'error'); return; }
        setAccounts(accounts.filter(a => a.id !== id));
        triggerNotification(`已手動移除「${name}」儲蓄戶`, 'success');
      };

      const handleDeletePosition = (posId, symbol) => {
        setPositions(positions.filter(p => p.id !== posId));
        triggerNotification(`已移除 ${symbol} 持股投資部位`, 'success');
      };

      // 記帳與交易異動（完美融合 INVENTORY 庫存模式）
      const handleAddTransaction = (e) => {
        e.preventDefault();
        const selAcc = accounts.find(a => a.id === txAccountId);
        if (!selAcc) { triggerNotification('請選擇一個有效的帳戶！', 'error'); return; }
        const todayStr = new Date().toISOString().split('T')[0];

        if (txType === 'TRANSFER') {
          const toAcc = accounts.find(a => a.id === txTargetAccountId);
          if (!toAcc) { triggerNotification('請選擇轉入帳戶！', 'error'); return; }
          const amt = parseFloat(txAmount);
          if (selAcc.balance < amt) { triggerNotification(`轉帳失敗：${selAcc.name} 帳戶餘額不足！`, 'error'); return; }
          const convRate = parseFloat(txPrice) || convertAmount(1, selAcc.currency, toAcc.currency);
          
          setAccounts(accounts.map(a => a.id === selAcc.id ? { ...a, balance: a.balance - amt } : a.id === toAcc.id ? { ...a, balance: a.balance + (amt * convRate) } : a));
          setTransactions([{ id: 'tx-' + Date.now(), type: 'TRANSFER', amount: amt, fromAccount: selAcc.id, toAccount: toAcc.id, symbol: null, shares: null, price: parseFloat(txPrice) || null, fee: parseFloat(txFee) || 0, date: todayStr, note: txNote || `轉帳往 ${toAcc.name}` }, ...transactions]);
        } else {
          const sharesNum = parseFloat(txShares), priceNum = parseFloat(txPrice), feeNum = parseFloat(txFee) || 0;
          const cleanSym = txSymbol.trim().toUpperCase();

          if (txType === 'DIVIDEND') {
            const divAmt = parseFloat(txAmount);
            setAccounts(accounts.map(a => a.id === selAcc.id ? { ...a, balance: a.balance + divAmt } : a));
            setTransactions([{ id: 'tx-' + Date.now(), type: 'DIVIDEND', amount: divAmt, fromAccount: null, toAccount: selAcc.id, symbol: cleanSym, shares: null, price: null, fee: 0, date: todayStr, note: txNote || `${cleanSym} 股息所得入帳` }, ...transactions]);
          } else if (txType === 'INVENTORY') {
            // 「匯入庫存/建倉」模式：不影響帳戶資金餘額
            const posIdx = positions.findIndex(p => p.accountId === selAcc.id && p.symbol === cleanSym);
            const newPos = [...positions];
            
            if (posIdx > -1) {
              const p = newPos[posIdx];
              newPos[posIdx] = { ...p, shares: p.shares + sharesNum, avgCost: (((p.shares * p.avgCost) + (sharesNum * priceNum)) / (p.shares + sharesNum)), currentPrice: priceNum };
            } else {
              newPos.push({ id: 'pos-' + Date.now(), accountId: selAcc.id, market: txMarket, symbol: cleanSym, name: txStockName || cleanSym, shares: sharesNum, avgCost: priceNum, currentPrice: priceNum });
            }
            setPositions(newPos);
            setTransactions([{ id: 'tx-' + Date.now(), type: 'INVENTORY', amount: 0, fromAccount: null, toAccount: selAcc.id, symbol: cleanSym, shares: sharesNum, price: priceNum, fee: 0, date: todayStr, note: txNote || `匯入庫存 ${cleanSym}` }, ...transactions]);
          } else {
            const cost = (sharesNum * priceNum) + (txType === 'BUY' ? feeNum : -feeNum);
            if (txType === 'BUY' && selAcc.balance < cost) { triggerNotification(`交易失敗：${selAcc.name} 交割餘額不足！`, 'error'); return; }
            
            const posIdx = positions.findIndex(p => p.accountId === selAcc.id && p.symbol === cleanSym);
            const newPos = [...positions];
            
            if (txType === 'BUY') {
              setAccounts(accounts.map(a => a.id === selAcc.id ? { ...a, balance: a.balance - cost } : a));
              if (posIdx > -1) {
                const p = newPos[posIdx];
                newPos[posIdx] = { ...p, shares: p.shares + sharesNum, avgCost: (((p.shares * p.avgCost) + (sharesNum * priceNum)) / (p.shares + sharesNum)), currentPrice: priceNum };
              } else {
                newPos.push({ id: 'pos-' + Date.now(), accountId: selAcc.id, market: txMarket, symbol: cleanSym, name: txStockName || cleanSym, shares: sharesNum, avgCost: priceNum, currentPrice: priceNum });
              }
            } else { // SELL 股票賣出
              const p = newPos[posIdx];
              if (!p || p.shares < sharesNum) { triggerNotification(`交易失敗：庫存持股數不足！`, 'error'); return; }
              const remain = p.shares - sharesNum;
              if (remain <= 0) newPos.splice(posIdx, 1);
              else newPos[posIdx] = { ...p, shares: remain, currentPrice: priceNum };
              setAccounts(accounts.map(a => a.id === selAcc.id ? { ...a, balance: a.balance + cost } : a));
            }
            setPositions(newPos);
            setTransactions([{ id: 'tx-' + Date.now(), type: txType, amount: cost, fromAccount: txType === 'BUY' ? selAcc.id : null, toAccount: txType === 'SELL' ? selAcc.id : null, symbol: cleanSym, shares: sharesNum, price: priceNum, fee: feeNum, date: todayStr, note: txNote || `${txType === 'BUY'?'購入':'售出'} ${cleanSym}` }, ...transactions]);
          }
        }
        setShowAddTxModal(false);
        triggerNotification('交易登錄成功！🌸', 'success');
      };

      // ----------------------------------------
      // 頁面渲染
      // ----------------------------------------
      if (!currentUser) {
        return (
          <div className="min-h-screen bg-[#f9f8f6] text-stone-600 font-sans flex flex-col items-center justify-center p-4 antialiased animate-fade-in relative">
            <div className="max-w-md w-full bg-white border border-stone-200/40 rounded-[32px] p-8 shadow-sm space-y-6 transition-all duration-300">
              
              <div className="text-center space-y-2 mb-4">
                <div className="w-16 h-16 rounded-[24px] bg-[#f3f0ec] flex items-center justify-center mx-auto shadow-sm overflow-hidden shrink-0">
                  {loginLogoError ? <span className="text-3xl">🍯</span> : <img src={LOGO_URL} alt="聚寶盆" className="w-full h-full object-cover rounded-[24px]" onError={() => setLoginLogoError(true)} />}
                </div>
                <h1 className="text-2xl font-bold text-stone-800 tracking-tight">聚寶盆</h1>
                <p className="text-xs text-stone-400 font-semibold tracking-wider">
                  {isFirebaseActive ? "☁️ 私有安全雲端同步模式" : "📱 本機極速對帳模式"}
                </p>
              </div>

              <form onSubmit={handleAuthSubmit} className="space-y-4 animate-fade-in">
                <div className="space-y-1">
                  <label className="text-[10px] text-stone-400 font-bold uppercase block">
                    {isFirebaseActive ? '雲端帳戶 (信箱格式)' : '本機帳戶名稱'}
                  </label>
                  <input type="text" required placeholder={isFirebaseActive ? "例如: account@jubaopen.com" : "請輸入本機帳戶"} value={usernameInput} onChange={e => setUsernameInput(e.target.value)} className="w-full bg-[#faf9f6] border border-stone-200/60 rounded-2xl px-4 py-2.5 text-xs text-stone-700 focus:outline-none focus:ring-1 focus:ring-[#9a8c7d]" />
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] text-stone-400 font-bold uppercase block">安全密碼</label>
                  <input type="password" required placeholder="請輸入密碼" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full bg-[#faf9f6] border border-stone-200/60 rounded-2xl px-4 py-2.5 text-xs text-stone-700 focus:outline-none focus:ring-1 focus:ring-[#9a8c7d]" />
                </div>
                <button type="submit" className={`w-full py-3 text-white font-semibold text-xs rounded-2xl transition-all shadow-md ${isFirebaseActive ? 'bg-sky-500 hover:bg-sky-600 shadow-sky-500/20' : 'bg-[#9a8c7d] hover:bg-[#8d7f70] shadow-[#9a8c7d]/20'}`}>
                  {authMode === 'login' ? '開啟聚寶盆 🍯' : '註冊新帳號 🎉'}
                </button>
                <div className="flex justify-between items-center text-xs px-1 pt-2">
                  <button type="button" onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className={`${isFirebaseActive ? 'text-sky-600' : 'text-[#9a8c7d]'} font-bold hover:underline`}>
                    {authMode === 'login' ? '註冊新帳號' : '返回登入'}
                  </button>
                  <button type="button" onClick={() => setShowSettingsModal(true)} className="text-stone-400 hover:text-stone-700 font-bold flex items-center gap-1">
                    {isFirebaseActive ? "⚙️ 雲端同步設定" : "☁️ 啟用雲端同步"}
                  </button>
                </div>
              </form>

            </div>

            <div className="max-w-md w-full text-center mt-6 text-[10px] text-stone-400 leading-relaxed bg-white/50 border border-stone-100 p-4 rounded-2xl">
              💡 <strong>iOS 行動教學：</strong>用 Safari 開啟此頁，點擊底部「分享」圖示並選擇「加入主畫面」，即可換上極美圖示享受滿版無框對帳體驗！
            </div>

            {/* 雲端設定彈窗 (首頁載入) */}
            {showSettingsModal && (
              <div className="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl max-w-md w-full p-6 space-y-4 shadow-xl">
                  <div className="flex justify-between items-center border-b pb-2">
                    <h3 className="text-xs font-bold text-stone-800">⚙️ 雲端同步金鑰設定</h3>
                    <button type="button" onClick={() => setShowSettingsModal(false)} className="text-stone-400">✕</button>
                  </div>
                  <form onSubmit={handleSaveSettings} className="space-y-3">
                    <textarea 
                      placeholder={`const firebaseConfig = {\n  apiKey: "AIzaSy...",\n  projectId: "...",\n  appId: "..."\n};`}
                      value={firebaseConfigInput} 
                      onChange={e => setFirebaseConfigInput(e.target.value)} 
                      className="w-full h-36 bg-stone-50 border rounded-xl p-3 text-[10px] font-mono text-stone-700 focus:outline-none" 
                    />
                    <p className="text-[10px] text-stone-400 font-bold">※ 提示：不需手動修改程式碼，直接將您的 Firebase 金鑰代碼貼入上方即可。清空並更新則返回本機模式。※</p>
                    <button type="submit" className="w-full py-2 bg-sky-500 text-white text-xs font-bold rounded-xl shadow-md">更新設定</button>
                  </form>
                </div>
              </div>
            )}

            {/* 在登入畫面中同步渲染 Notification，使得錯誤提醒能被看見 */}
            {notification && (
              <div className="fixed bottom-4 right-4 z-50 animate-fade-in">
                <div className={`px-4 py-3 rounded-xl shadow-lg border text-xs font-medium flex items-center gap-2 ${notification.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-700' : notification.type === 'info' ? 'bg-sky-50 border-sky-100 text-sky-700' : 'bg-emerald-50 border-emerald-150 text-emerald-700'}`}>
                  <span>{notification.message}</span>
                </div>
              </div>
            )}
          </div>
        );
      }

      // 登入後的主控板畫面
      return (
        <div className="min-h-screen bg-[#fcfdfe] text-slate-600 font-sans flex flex-col antialiased">
          
          <header className="sticky top-0 z-30 bg-[#f0f7ff]/90 backdrop-blur-md border-b border-sky-100 px-4 py-3 sm:px-6 sm:py-4 flex items-center justify-between gap-2">
            <div className="flex items-center space-x-2 min-w-0">
              <div className="w-8 h-8 sm:w-9 sm:h-9 rounded-2xl bg-sky-200 flex items-center justify-center shadow-sm overflow-hidden shrink-0">
                {headerLogoError ? <span className="text-base sm:text-lg">🍯</span> : <img src={LOGO_URL} alt="聚寶盆" className="w-full h-full object-cover rounded-2xl" onError={() => setHeaderLogoError(true)} />}
              </div>
              <div className="min-w-0">
                <h1 className="text-sm sm:text-md font-bold text-slate-800 tracking-tight truncate">聚寶盆</h1>
                <p className="text-[9px] sm:text-[10px] text-sky-400 font-medium truncate">個人專屬財富管家</p>
              </div>
            </div>

            <div className="flex items-center space-x-1.5 sm:space-x-3 shrink-0">
              {/* 雲端 / 本機狀態按鈕 */}
              <button type="button" onClick={() => setShowSettingsModal(true)} className="flex items-center shrink-0">
                {cloudSyncStatus === 'synced' && <span className="text-[10px] sm:text-xs bg-emerald-50 text-emerald-600 border border-emerald-100 px-2.5 py-1 rounded-full font-extrabold flex items-center gap-1"><span>☁️</span><span className="hidden sm:inline">雲端已同步</span></span>}
                {cloudSyncStatus === 'syncing' && <span className="text-[10px] sm:text-xs bg-sky-50 text-sky-600 border border-sky-100 px-2.5 py-1 rounded-full font-extrabold flex items-center gap-1 animate-pulse"><span>☁️</span><span className="hidden sm:inline">同步中</span></span>}
                {cloudSyncStatus === 'local' && <span className="text-[10px] sm:text-xs bg-amber-50 text-amber-600 border border-amber-100 px-2.5 py-1 rounded-full font-extrabold flex items-center gap-1"><span>📱</span><span className="hidden sm:inline">本機模式</span></span>}
                {cloudSyncStatus === 'error' && <span className="text-[10px] sm:text-xs bg-rose-50 text-rose-600 border border-rose-100 px-2.5 py-1 rounded-full font-extrabold flex items-center gap-1"><span>⚠️</span><span className="hidden sm:inline">連線異常</span></span>}
              </button>

              <button onClick={() => setHideValues(!hideValues)} className="p-1 text-slate-400 hover:text-sky-500 transition-colors shrink-0">
                {hideValues ? <Icons.EyeOff className="w-4 h-4 sm:w-5 sm:h-5" /> : <Icons.Eye className="w-4 h-4 sm:w-5 sm:h-5" />}
              </button>
              
              <div className="bg-slate-50 p-0.5 sm:p-1 rounded-lg sm:rounded-xl flex space-x-0.5 border border-slate-100 shrink-0">
                {['TWD', 'USD', 'JPY'].map(curr => (
                  <button key={curr} onClick={() => setDisplayCurrency(curr)} className={`px-1.5 py-0.5 sm:px-3 sm:py-1 text-[10px] sm:text-xs font-semibold rounded-md sm:rounded-lg transition-all ${displayCurrency === curr ? 'bg-sky-200 text-sky-900 shadow-sm' : 'text-slate-400 hover:text-slate-700'}`}>{curr}</button>
                ))}
              </div>

              <button onClick={handleLogout} className="p-1 text-slate-400 hover:text-rose-400 transition-colors shrink-0" title="安全登出">
                <Icons.Logout className="w-4 h-4 sm:w-5 sm:h-5" />
              </button>
            </div>
          </header>

          {notification && (
            <div className="fixed bottom-4 right-4 z-50 animate-fade-in">
              <div className={`px-4 py-3 rounded-xl shadow-lg border text-xs font-medium flex items-center gap-2 ${notification.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-700' : notification.type === 'info' ? 'bg-sky-50 border-sky-100 text-sky-700' : 'bg-emerald-50 border-emerald-150 text-emerald-700'}`}>
                <span>{notification.message}</span>
              </div>
            </div>
          )}

          <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-8">
            <section className="w-full lg:w-[410px] shrink-0 space-y-6">
              
              <div className="relative overflow-hidden bg-gradient-to-br from-[#e0f2fe] to-[#e0f2fe]/40 border border-sky-100/60 rounded-[30px] p-6 text-slate-800 shadow-sm shadow-sky-100/30">
                <span className="text-[10px] font-bold tracking-widest text-slate-400 uppercase">當前預估淨資產 (Net Worth)</span>
                <h2 className="text-3xl font-extrabold tracking-tight text-slate-800 mt-2">{formatMoney(convertAmount(netWorthTWD, 'TWD', displayCurrency))}</h2>
                <div className="mt-6 pt-5 border-t border-sky-100/50 grid grid-cols-2 gap-4 text-xs">
                  <div><p className="text-slate-400">可用資金存款</p><p className="font-extrabold text-slate-700 mt-0.5">{formatMoney(convertAmount(totalCashTWD, 'TWD', displayCurrency))}</p></div>
                  <div><p className="text-slate-400">持股投資市值</p><p className="font-extrabold text-slate-700 mt-0.5">{formatMoney(convertAmount(positionsAnalysis.totalStockValueTWD, 'TWD', displayCurrency))}</p></div>
                </div>
              </div>

              <div className="bg-white border border-slate-100 rounded-[24px] p-5 shadow-sm space-y-4">
                <div className="flex justify-between items-center text-xs font-semibold">
                  <span className="text-slate-700">目標進度 {((netWorthTWD / savingsGoal) * 100).toFixed(1)}%</span>
                  <span className="text-slate-400">目標 {formatMoney(convertAmount(savingsGoal, 'TWD', displayCurrency))}</span>
                </div>
                <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-sky-300 rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (netWorthTWD / savingsGoal) * 100)}%` }} />
                </div>
              </div>

              <div className="bg-white border border-slate-100 rounded-[24px] p-6 shadow-sm">
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">資產分配圓餅圖</h3>
                {donutData.length > 0 ? (
                  <div className="flex items-center gap-6">
                    <div className="relative w-32 h-32 flex-shrink-0">
                      <svg width="100%" height="100%" viewBox="0 0 42 42" className="transform -rotate-90">
                        <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#f1f5f9" strokeWidth="4.5" />
                        {donutData.map((seg, idx) => (
                          <circle key={idx} cx="21" cy="21" r="15.915" fill="transparent" stroke={seg.color} strokeWidth="4.8" strokeDasharray={`${seg.percent} ${100 - seg.percent}`} strokeDashoffset={100 - seg.startPercent + 25} className="transition-all duration-500" />
                        ))}
                      </svg>
                    </div>
                    <div className="flex-1 space-y-2.5 min-w-0">
                      {donutData.map((item, idx) => (
                        <div key={idx} className="flex justify-between text-xs">
                          <div className="flex items-center space-x-2 truncate"><span className={`w-2.5 h-2.5 rounded-full ${item.tailwindColor} shrink-0`} /><span className="text-slate-600 truncate">{item.name}</span></div>
                          <span className="font-bold text-slate-800 ml-2">{item.percent.toFixed(1)}%</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="text-center text-xs text-slate-400 py-6">目前無資產資料以繪製圖表。</div>
                )}
              </div>
            </section>

            <section className="flex-1 min-w-0 space-y-6">
              <div className="flex space-x-1 p-1 bg-slate-100/70 rounded-xl">
                {['dashboard', 'accounts', 'positions', 'transactions'].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === tab ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                    {tab === 'dashboard' ? '資產明細' : tab === 'accounts' ? '帳戶管理' : tab === 'positions' ? '股票投資' : '記帳歷史'}
                  </button>
                ))}
              </div>

              {activeTab === 'dashboard' && (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
                    <span className="text-xs text-slate-400 font-bold block">可用存款總計</span>
                    <p className="text-xl font-bold text-slate-800 mt-1">{formatMoney(convertAmount(totalCashTWD, 'TWD', displayCurrency))}</p>
                  </div>
                  <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
                    <span className="text-xs text-slate-400 font-bold block">股票市值總計</span>
                    <p className="text-xl font-bold text-slate-800 mt-1">{formatMoney(convertAmount(positionsAnalysis.totalStockValueTWD, 'TWD', displayCurrency))}</p>
                  </div>
                </div>
              )}

              {activeTab === 'accounts' && (
                <div className="space-y-4">
                  <div className="flex justify-between items-center">
                    <h3 className="text-sm font-bold text-slate-800">儲蓄帳戶</h3>
                    <button onClick={() => setShowAddAccountModal(true)} className="bg-sky-200 hover:bg-sky-300 text-sky-900 px-3 py-1.5 rounded-xl text-xs font-bold transition-colors">建立新帳戶</button>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {accounts.map(acc => (
                      <div key={acc.id} className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm relative group overflow-hidden transition-shadow hover:shadow-md">
                        <div className="absolute top-0 left-0 w-1 h-full bg-sky-200"></div>
                        <div className="flex justify-between items-center">
                          <div>
                            <h4 className="text-sm font-bold text-slate-800">{acc.name}</h4>
                            <span className="text-[10px] text-slate-400 font-medium">{acc.type === 'BANK' ? '銀行存款' : acc.type === 'INVESTMENT' ? '交割帳戶' : '現金袋'} • {acc.currency}</span>
                          </div>
                          <button onClick={() => handleDeleteAccount(acc.id, acc.name)} className="text-slate-300 hover:text-rose-400 opacity-0 group-hover:opacity-100 transition"><Icons.Trash className="w-4 h-4" /></button>
                        </div>
                        <p className="text-lg font-bold text-slate-800 mt-3">{formatMoney(acc.balance, acc.currency)}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === 'positions' && (
                <div className="space-y-4">
                  <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                    <div className="flex items-center gap-2">
                      <h3 className="text-sm font-bold text-slate-800">台美持股明細</h3>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={handleUpdateStockQuotes} disabled={stockLoading} className="bg-slate-50 hover:bg-slate-100 border border-slate-150 px-3 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1.5 transition-all">
                        <Icons.Refresh className={`w-3.5 h-3.5 ${stockLoading ? 'animate-spin text-sky-500' : ''}`} /><span>更新即時市價</span>
                      </button>
                      <button onClick={() => { setTxType('BUY'); setShowAddTxModal(true); }} className="bg-sky-200 hover:bg-sky-300 text-sky-900 px-3 py-1.5 rounded-xl text-xs font-bold transition-all">登錄交易/庫存</button>
                    </div>
                  </div>
                  <div className="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
                    <div className="overflow-x-auto">
                      <table className="w-full text-xs text-left min-w-[600px]">
                        <thead>
                          <tr className="bg-slate-50/50 border-b border-slate-100 text-slate-400 font-bold">
                            <th className="py-3 px-4">代號 / 名稱</th><th className="py-3 px-4 text-right">股數</th><th className="py-3 px-4 text-right">平均成本</th><th className="py-3 px-4 text-right">目前現價</th><th className="py-3 px-4 text-right">市值</th><th className="py-3 px-4 text-right">未實現損益</th><th className="py-3 px-4 text-center">操作</th>
                          </tr>
                        </thead>
                        <tbody>
                          {positionsAnalysis.list.map(pos => (
                            <tr key={pos.id} className="border-b border-slate-50 hover:bg-slate-50/20">
                              <td className="py-3 px-4 font-bold"><div className="flex items-center gap-1.5"><span className="text-slate-800">{pos.symbol}</span><span className={`text-[8px] px-1.5 py-0.5 rounded font-semibold ${pos.market === 'US' ? 'bg-blue-50 text-blue-500' : 'bg-emerald-50 text-emerald-500'}`}>{pos.market === 'US' ? '美' : '台'}</span></div><span className="text-[10px] text-slate-400 block font-normal truncate max-w-[120px]">{pos.name}</span></td>
                              <td className="py-3 px-4 text-right font-medium">{pos.shares.toLocaleString()}</td>
                              <td className="py-3 px-4 text-right">{formatMoney(pos.avgCost, pos.market === 'US' ? 'USD' : 'TWD')}</td>
                              <td className="py-3 px-4 text-right font-bold text-slate-800">{formatMoney(pos.currentPrice, pos.market === 'US' ? 'USD' : 'TWD')}</td>
                              <td className="py-3 px-4 text-right font-extrabold">{formatMoney(convertAmount(pos.valueTWD, 'TWD', displayCurrency))}</td>
                              <td className="py-3 px-4 text-right"><span className={`font-bold block ${pos.profitTWD >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{pos.profitTWD >= 0 ? '+' : ''}{formatMoney(convertAmount(pos.profitTWD, 'TWD', displayCurrency))}</span><span className={`text-[10px] font-semibold ${pos.profitTWD >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{pos.profitPercent.toFixed(1)}%</span></td>
                              <td className="py-3 px-4 text-center"><button onClick={() => handleDeletePosition(pos.id, pos.symbol)} className="text-slate-300 hover:text-rose-400 transition-colors"><Icons.Trash className="w-4 h-4" /></button></td>
                            </tr>
                          ))}
                          {positions.length === 0 && <tr><td colSpan="7" className="py-8 text-center text-slate-400 font-medium">您的盆內目前尚無持股部位。</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'transactions' && (
                <div className="space-y-4 animate-fade-in">
                  <div className="flex justify-between items-center">
                    <h3 className="text-sm font-bold text-slate-800">記帳歷史紀錄</h3>
                    <button onClick={() => { setTxType('TRANSFER'); setShowAddTxModal(true); }} className="bg-sky-200 hover:bg-sky-300 text-sky-900 px-3 py-1.5 rounded-xl text-xs font-bold transition-colors">轉帳/換匯</button>
                  </div>
                  <div className="bg-white border border-slate-100 rounded-[24px] overflow-hidden shadow-sm divide-y divide-slate-50">
                    {transactions.map(tx => (
                      <div key={tx.id} className="p-4 flex justify-between items-center text-xs hover:bg-slate-50/20 transition-all">
                        <div>
                          <p className="font-bold text-slate-800">{tx.note}</p>
                          <span className="text-[9px] text-slate-400">{tx.date}</span>
                        </div>
                        <span className="font-extrabold text-slate-800">
                          {tx.type === 'INVENTORY' ? (
                            <span className="text-slate-400 font-medium bg-slate-100 px-2 py-0.5 rounded text-[10px]">庫存建倉 (無扣款)</span>
                          ) : (
                            `${tx.type === 'BUY' ? '-' : '+'}${formatMoney(tx.amount)}`
                          )}
                        </span>
                      </div>
                    ))}
                    {transactions.length === 0 && <div className="py-8 text-center text-slate-400 font-medium">目前尚無帳戶收支流向。</div>}
                  </div>
                </div>
              )}
            </section>
          </main>

          {/* 彈窗：新增帳戶 */}
          {showAddAccountModal && (
            <div className="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 space-y-4 shadow-xl">
                <h3 className="text-xs font-bold text-slate-800">{editingAccount ? '✏️ 修改聚寶存款帳戶' : '🍯 建立聚寶存款帳戶'}</h3>
                <form onSubmit={handleAccountSubmit} className="space-y-4">
                  <div><label className="text-[10px] text-slate-400 block mb-1">帳戶名稱</label><input type="text" required value={newAccName} onChange={e => setNewAccName(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-xs focus:outline-none" /></div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="text-[10px] text-slate-400 block mb-1">類別</label><select value={newAccType} onChange={e => setNewAccType(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-xs focus:outline-none"><option value="BANK">銀行存款</option><option value="INVESTMENT">證券交割</option><option value="CASH">手存現金</option></select></div>
                    <div><label className="text-[10px] text-slate-400 block mb-1">幣別</label><select value={newAccCurrency} onChange={e => setNewAccCurrency(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-xs focus:outline-none"><option value="TWD">TWD</option><option value="USD">USD</option><option value="JPY">JPY</option><option value="EUR">EUR</option></select></div>
                  </div>
                  <div><label className="text-[10px] text-slate-400 block mb-1">資金存款額</label><input type="number" required value={newAccBalance} onChange={e => setNewAccBalance(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-sky-200" /></div>
                  <div className="flex justify-end gap-2"><button type="button" onClick={() => { setShowAddAccountModal(false); setEditingAccount(null); }} className="px-4 py-2 bg-slate-100 text-xs font-bold rounded-xl text-slate-500">取消</button><button type="submit" className="px-5 py-2 bg-sky-200 text-xs font-bold rounded-xl text-sky-900">{editingAccount ? '保存' : '建立'}</button></div>
                </form>
              </div>
            </div>
          )}

          {/* 彈窗：新增交易 / 庫存建倉 */}
          {showAddTxModal && (
            <div className="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl max-w-lg w-full p-6 space-y-4 shadow-xl max-h-[90vh] overflow-y-auto">
                <h3 className="text-xs font-bold text-slate-800">登錄交易與帳務</h3>
                <form onSubmit={handleAddTransaction} className="space-y-4">
                  <div>
                    <div className="grid grid-cols-5 gap-1.5">
                      {['BUY', 'SELL', 'INVENTORY', 'TRANSFER', 'DIVIDEND'].map(type => (
                        <button key={type} type="button" onClick={() => setTxType(type)} className={`py-2 px-1 text-[10px] font-bold rounded-xl border ${txType === type ? 'bg-sky-50 text-sky-500 border-sky-200' : 'bg-slate-50/50 text-slate-400 border-slate-100'}`}>
                          {type === 'BUY' ? '買入' : type === 'SELL' ? '賣出' : type === 'INVENTORY' ? '匯入庫存' : type === 'TRANSFER' ? '轉帳' : '配息'}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] text-slate-400 block mb-1">
                        {txType === 'INVENTORY' ? '庫存歸屬帳戶 (不會扣款)' : '帳戶'}
                      </label>
                      <select required value={txAccountId} onChange={e => setTxAccountId(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-xs">
                        <option value="">-- 選擇帳戶 --</option>{accounts.map(a => <option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
                      </select>
                    </div>
                    {txType === 'TRANSFER' && (
                      <div>
                        <label className="text-[10px] text-slate-400 block mb-1">目標流入帳戶</label>
                        <select required value={txTargetAccountId} onChange={e => setTxTargetAccountId(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-xs">
                          <option value="">-- 選擇帳戶 --</option>{accounts.map(a => <option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
                        </select>
                      </div>
                    )}
                  </div>

                  {(txType === 'BUY' || txType === 'SELL' || txType === 'INVENTORY' || txType === 'DIVIDEND') && (
                    <div className="p-4 bg-slate-50 border rounded-2xl space-y-3 animate-fade-in">
                      <div className="flex justify-between border-b pb-2">
                        <span className="text-xs font-bold text-sky-500">證券與即時報價查詢</span>
                        <div className="flex space-x-1">
                          <button type="button" onClick={() => setTxMarket('TW')} className={`text-[9px] font-bold px-2 py-0.5 rounded ${txMarket === 'TW' ? 'bg-sky-200 text-sky-900' : 'bg-slate-100 text-slate-400'}`}>台股</button>
                          <button type="button" onClick={() => setTxMarket('US')} className={`text-[9px] font-bold px-2 py-0.5 rounded ${txMarket === 'US' ? 'bg-sky-200 text-sky-900' : 'bg-slate-100 text-slate-400'}`}>美股</button>
                        </div>
                      </div>
                      <div className="flex gap-2">
                        <input type="text" placeholder="代號如 2330" required={txType !== 'DIVIDEND'} value={txSymbol} onChange={e => setTxSymbol(e.target.value)} className="w-1/3 bg-white border rounded-lg px-3 py-2 text-xs" />
                        <input type="text" placeholder="股票名稱" value={txStockName} onChange={e => setTxStockName(e.target.value)} className="w-1/3 bg-white border rounded-lg px-3 py-2 text-xs" />
                        <button type="button" onClick={handleQueryStockPrice} className="w-1/3 bg-sky-200 text-sky-900 font-bold rounded-lg text-xs hover:bg-sky-300">查詢現價</button>
                      </div>
                      {txType !== 'DIVIDEND' && (
                        <div className="flex gap-2 mt-2">
                          <input type="number" placeholder="股數" required value={txShares} onChange={e => setTxShares(e.target.value)} className="flex-1 bg-white border rounded-lg px-3 py-1.5 text-xs" />
                          <input type="number" placeholder="單價成本" step="any" required value={txPrice} onChange={e => setTxPrice(e.target.value)} className="flex-1 bg-white border rounded-lg px-3 py-1.5 text-xs" />
                          {txType !== 'INVENTORY' && (
                            <input type="number" placeholder="手續費" value={txFee} onChange={e => setTxFee(e.target.value)} className="flex-1 bg-white border rounded-lg px-3 py-1.5 text-xs" />
                          )}
                        </div>
                      )}
                    </div>
                  )}

                  {(txType === 'TRANSFER' || txType === 'DIVIDEND') && (
                    <div className="animate-fade-in"><label className="text-[10px] text-slate-400 block mb-1">金額</label><input type="number" required value={txAmount} onChange={e => setTxAmount(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-4 py-2.5 text-xs focus:outline-none" /></div>
                  )}

                  <div><label className="text-[10px] text-slate-400 block mb-1">備註說明 (選填)</label><input type="text" value={txNote} onChange={e => setTxNote(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-4 py-2.5 text-xs focus:outline-none" /></div>

                  <div className="flex justify-end gap-2 pt-2 border-t"><button type="button" onClick={() => setShowAddTxModal(false)} className="px-4 py-2 bg-slate-100 text-xs font-bold rounded-xl text-slate-500">取消</button><button type="submit" className="px-5 py-2 bg-sky-200 text-xs font-bold rounded-xl text-sky-900">確認並登記</button></div>
                </form>
              </div>
            </div>
          )}

          {/* 雲端金鑰重設 / 登入後彈窗 */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl max-w-md w-full p-6 space-y-4 shadow-xl">
                <div className="flex justify-between items-center border-b pb-2">
                  <h3 className="text-xs font-bold text-stone-800">⚙️ 雲端同步設定</h3>
                  <button type="button" onClick={() => setShowSettingsModal(false)} className="text-stone-400">✕</button>
                </div>
                <form onSubmit={handleSaveSettings} className="space-y-3">
                  <textarea 
                    placeholder={`const firebaseConfig = {\n  apiKey: "AIzaSy...",\n  projectId: "...",\n  appId: "..."\n};`}
                    value={firebaseConfigInput} 
                    onChange={e => setFirebaseConfigInput(e.target.value)} 
                    className="w-full h-36 bg-stone-50 border rounded-xl p-3 text-[10px] font-mono text-stone-700 focus:outline-none" 
                  />
                  <p className="text-[10px] text-stone-400">※ 提示：若想恢復為極速本機離線模式，請將上方輸入框清空後點擊更新即可。※</p>
                  <button type="submit" className="w-full py-2 bg-sky-500 text-white text-xs font-bold rounded-xl shadow-md">更新設定</button>
                </form>
              </div>
            </div>
          )}

          <footer className="bg-white border-t border-slate-100 py-6 text-center text-[11px] text-slate-400 mt-auto">
            <span>© 2026 聚寶盆 · 極簡雲端個人財富管家</span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    // 移除了錯誤的 root.render(App())，改用標準 React 18 JSX 的渲染模式，防止 Hooks Dispatcher 抓取失敗
    root.render(<App />);
  </script>
</body>
</html>
